on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Sync ato dependencies
        run: uv run ato sync
        working-directory: elec

      - name: Build circuit
        run: uv run ato build --frozen
        working-directory: elec

      - name: Export PCB layout diagram
        run: |
          docker run --rm \
            -v "$(pwd)/elec:/board" \
            ghcr.io/inti-cmnb/kicad9_auto:latest \
            kicad-cli pcb export svg \
              --layers "F.Cu,B.Cu,F.SilkS,B.SilkS,Edge.Cuts" \
              --black-and-white \
              --output /board/build/pcb-layout.svg \
              /board/layouts/default/default.kicad_pcb
        continue-on-error: true

      - name: Add PCB preview to job summary
        run: |
          echo "## PCB Layout" >> $GITHUB_STEP_SUMMARY
          if [ -f elec/build/pcb-layout.svg ]; then
            echo "<img src=\"data:image/svg+xml;base64,$(base64 -w0 elec/build/pcb-layout.svg)\" width=\"900\" />" >> $GITHUB_STEP_SUMMARY
          else
            echo "_PCB layout not yet available — complete Phase 5 (KiCad layout) to generate this diagram._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: elec/build/
